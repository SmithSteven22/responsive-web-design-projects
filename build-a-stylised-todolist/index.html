<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="device-width, initial-scale=1.0">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h2>My To-Do tasks</h2>
        <ul class="todo-list">
            <li>
                <input type="checkbox" id="first-input">
                <label for="first-input">My first tasks</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/a" target="_blank">Tasks link</a> 
                    </li>
                </ul>
            </li>

            <li>
                <input type="checkbox" id="second-input">
                <label for="second-input">My second tasks</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/a" target="_blank">Tasks link</a>
                    </li>
                </ul>
            </li>

            <li>
                <input type="checkbox" id="third-input">
                <label for="third-input">My third tasks</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/a" target="_blank">Tasks link</a>
                    </li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="fourth-input">
                <label for="fourth-input">My fourth tasks</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/a" target="_blank">Tasks link</a>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</body>

</html>
